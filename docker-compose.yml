version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - '4000:4000'

  folon-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: folon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - folon_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  folon-marketplace:
    build:
      context: ./folon-marketplace
      dockerfile: Dockerfile
    depends_on:
      folon-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@folon-db:5432/folon
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@folon.app}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      APP_ID: ${APP_ID:-folon}
      APP_NAME: ${APP_NAME:-Folon Marketplace}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Folon Marketplace}
      NEXT_PUBLIC_PRIMARY_COLOR: ${NEXT_PUBLIC_PRIMARY_COLOR:-#4CA771}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      NODE_ENV: production
    volumes:
      - folon_uploads:/app/public/uploads
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  folon_postgres_data:
  folon_uploads:
